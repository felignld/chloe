<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach Chloe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; }

    #chloe-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    #chloe-btn {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: #32CD32;
      border: 3px solid white;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      gap: 2px;
    }
    #chloe-btn .icona { font-size: 22px; }
    #chloe-btn .etichetta {
      font-size: 8px;
      color: white;
      font-weight: bold;
      font-family: Arial, sans-serif;
    }

    #chloe-panel {
      display: none;
      margin-bottom: 12px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      width: 300px;
      background: transparent;
    }

    @media (max-width: 480px) {
      #chloe-widget { bottom: 15px; right: 15px; }
      #chloe-panel { width: 260px; }
      #chloe-btn { width: 58px; height: 58px; }
    }
  </style>
</head>
<body>

  <div id="chloe-widget">
    <div id="chloe-panel">
      <elevenlabs-convai agent-id="agent_7901kqsb166denkbp3j1d0qy45p6">
      </elevenlabs-convai>
    </div>
    <button id="chloe-btn" onclick="toggleChloe()">
      <span class="icona">📞</span>
      <span class="etichetta">CHLOE</span>
    </button>
  </div>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
  <script>
    let aperto = false;
    function toggleChloe() {
      const panel = document.getElementById('chloe-panel');
      aperto = !aperto;
      panel.style.display = aperto ? 'block' : 'none';
    }
  </script>

</body>
</html>
