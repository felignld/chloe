<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach Chloe - NeoLife</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: transparent;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      min-height: 100vh;
      padding: 0;
    }

    /* WIDGET CONTENITORE */
    #chloe-widget {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    /* PULSANTE PICCOLO (stato chiuso) */
    #chloe-btn {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: #32CD32;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }
    #chloe-btn:hover { transform: scale(1.1); }
    #chloe-btn img {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    /* PANNELLO ESPANSO (stato aperto) */
    #chloe-panel {
      display: none;
      margin-bottom: 15px;
      background: #0e294b;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      width: 320px;
      height: 480px;
    }

    /* MOBILE */
    @media (max-width: 480px) {
      #chloe-panel {
        width: 290px;
        height: 420px;
      }
      #chloe-btn {
        width: 58px;
        height: 58px;
      }
    }

    elevenlabs-convai {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div id="chloe-widget">
    
    <!-- PANNELLO ESPANSO -->
    <div id="chloe-panel">
      <elevenlabs-convai 
        agent-id="agent_7901kqsb166denkbp3j1d0qy45p6">
      </elevenlabs-convai>
    </div>

    <!-- PULSANTE TONDO -->
    <button id="chloe-btn" onclick="toggleChloe()">
      🎙️
    </button>

  </div>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

  <script>
    let aperto = false;

    function toggleChloe() {
      const panel = document.getElementById('chloe-panel');
      aperto = !aperto;
      panel.style.display = aperto ? 'block' : 'none';
    }
  </script>

</body>
</html>
